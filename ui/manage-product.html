<!DOCTYPE html>
<html>
<head>
    <title>Manage Products</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- ✅ YOUR CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- ✅ OVERLAY -->
<div class="overlay">

    <!-- ✅ NAVBAR -->
    <nav class="navbar navbar-dark">
        <a class="navbar-brand" href="index.html">Grocery Store</a>

        <div class="ml-auto">
            <a href="index.html" class="btn btn-light btn-sm">Home</a>
            <a href="order.html" class="btn btn-light btn-sm">Orders</a>
        </div>
    </nav>

    <div class="container mt-4">

        <!-- HEADER -->
        <div class="d-flex justify-content-between mb-4">
            <h2>Manage Products</h2>

            <button class="btn btn-success" data-toggle="modal" data-target="#productModal">
                <i class="fa fa-plus"></i> Add Product
            </button>
        </div>

        <!-- TABLE -->
        <table class="table table-bordered table-hover bg-white">
            <thead class="thead-dark">
                <tr>
                    <th>Name</th>
                    <th>Unit</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

    </div>

</div>

<!-- ✅ MODAL -->
<div class="modal fade" id="productModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Add Product</h5>
                <button class="close" data-dismiss="modal">&times;</button>
            </div>

            <div class="modal-body">

                <form id="productForm">

                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" name="product_name" id="name" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label>Unit</label>
                        <select name="uom_id" id="uoms" class="form-control" required></select>
                    </div>

                    <div class="form-group">
                        <label>Price</label>
                        <input type="number" name="price_per_unit" id="price" class="form-control" required>
                    </div>

                </form>

            </div>

            <div class="modal-footer">
                <button class="btn btn-primary" id="saveProduct">
                    <i class="fa fa-save"></i> Save
                </button>
            </div>

        </div>
    </div>
</div>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- ✅ YOUR JS -->
<script src="js/custom/common.js"></script>
<script src="js/custom/manage-product.js"></script>

</body>
</html>
