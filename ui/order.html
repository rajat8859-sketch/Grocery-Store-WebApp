<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>New Order - Grocery Store</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Custom CSS -->                
    <link rel="stylesheet" href="CSS/style.css">

</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">

        <a class="navbar-brand" href="#">
            Grocery Store
        </a>

        <div class="ml-auto">

            <a href="index.html" class="btn btn-light btn-sm">
                Home
            </a>

            <a href="manage-product.html" class="btn btn-light btn-sm">
                Products
            </a>

        </div>

    </nav>


    <!-- Main Container -->
    <div class="container mt-5">

        <div class="card shadow-lg border-0">

            <div class="card-body">

                <!-- Header -->
                <div class="d-flex justify-content-between align-items-center mb-4">

                    <h2 class="font-weight-bold">
                        New Order
                    </h2>

                    <a href="index.html"
                       class="btn btn-secondary">
                        Back
                    </a>

                </div>


                <!-- Customer Name -->
                <div class="form-group">

                    <input type="text"
                           class="form-control"
                           name="customerName"
                           placeholder="Enter Customer Name">

                </div>


                <!-- Table Heading -->
                <div class="row font-weight-bold mb-2 text-center">

                    <div class="col-md-4">
                        Product
                    </div>

                    <div class="col-md-2">
                        Price
                    </div>

                    <div class="col-md-2">
                        Quantity
                    </div>

                    <div class="col-md-2">
                        Total
                    </div>

                    <div class="col-md-2">

                        <button type="button"
                                class="btn btn-primary btn-sm"
                                id="addMoreButton">

                            <i class="fa fa-plus"></i> Add

                        </button>

                    </div>

                </div>


                <!-- Product Rows -->
                <div class="product-box-extra">


                    <!-- First Row -->
                    <div class="row product-item mb-3 text-center">

                        <!-- Product -->
                        <div class="col-md-4">

                            <select class="form-control cart-product"
                                    name="product">

                                <option value="">
                                    Select Product
                                </option>

                            </select>

                        </div>


                        <!-- Price -->
                        <div class="col-md-2">

                            <input type="text"
                                   class="form-control product-price"
                                   id="product_price"
                                   readonly>

                        </div>


                        <!-- Quantity -->
                        <div class="col-md-2">

                            <input type="number"
                                   class="form-control product-qty"
                                   name="qty"
                                   value="1">

                        </div>


                        <!-- Total -->
                        <div class="col-md-2">

                            <input type="text"
                                   class="form-control item-total"
                                   name="item_total"
                                   readonly>

                        </div>


                        <!-- Remove -->
                        <div class="col-md-2">

                            <button type="button"
                                    class="btn btn-danger remove-row">

                                Remove

                            </button>

                        </div>

                    </div>

                </div>


                <!-- Grand Total -->
                <div class="row mt-4">

                    <div class="col-md-8"></div>

                    <div class="col-md-2">

                        <h4>Total</h4>

                    </div>

                    <div class="col-md-2">

                        <input type="text"
                               id="product_grand_total"
                               name="product_grand_total"
                               class="form-control"
                               value="0.00"
                               readonly>

                    </div>

                </div>


                <!-- Save Button -->
                <div class="row mt-4">

                    <div class="col-md-8"></div>

                    <div class="col-md-4">

                        <button type="button"
                                class="btn btn-success btn-block"
                                id="saveOrder">

                            <i class="fa fa-save"></i>
                            Save Order

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>


    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="JS/custom/common.js"></script>
    <script src="JS/custom/order.js"></script>

</body>
</html>
